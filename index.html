<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problem Solving Lab - Không Gian Luyện Tập</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 50% 50%, #0d1527 0%, #070a13 100%);
        }
        .cyber-title { font-family: 'Space Grotesk', sans-serif; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        ::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.3); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="text-slate-200 h-screen overflow-hidden flex flex-col p-4">

    <header class="flex-none grid grid-cols-3 items-center border-b border-slate-800 pb-3 mb-3">
        <div>
            <a href="main.html" class="inline-flex items-center text-xs text-blue-400 hover:text-blue-300 transition-all">
                ← Quay lại trang chủ
            </a>
            <h1 class="cyber-title text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-purple-400 to-amber-400 uppercase tracking-wider">
                Problem Solving Lab
            </h1>
        </div>
        <div class="col-span-2 flex flex-col gap-1">
            <label class="text-[11px] font-semibold text-slate-400 uppercase tracking-widest">Nêu vấn đề cần giải quyết:</label>
            <input type="text" id="problemInput" placeholder="Nhập bài toán hoặc thách thức cốt lõi bạn đang gặp phải tại đây..." 
                   class="w-full bg-slate-900/80 border border-slate-700 rounded px-3 py-1.5 text-sm text-amber-300 placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
        </div>
    </header>

    <main class="flex-1 grid grid-cols-12 gap-4 min-h-0">
        
        <section class="col-span-3 flex flex-col bg-slate-900/40 border border-slate-800 rounded p-3 min-h-0">
            <div class="flex justify-between items-center mb-2 flex-none">
                <h2 class="text-xs font-bold uppercase tracking-wider text-slate-400">Bộ Khung Tư Duy</h2>
                <button onclick="openAddMethodModal()" class="text-[10px] bg-blue-600/20 hover:bg-blue-600 border border-blue-500/30 text-blue-300 hover:text-white px-2 py-0.5 rounded transition-all">
                    + Thêm mới
                </button>
            </div>
            
            <div id="methodList" class="flex-1 overflow-y-auto space-y-1.5 pr-1">
                </div>
        </section>

        <section id="workspaceSection" class="col-span-5 flex flex-col bg-slate-900/40 border border-slate-800 rounded p-3 min-h-0 hidden">
            <div class="flex-none border-b border-slate-800/80 pb-2 mb-2">
                <div class="flex justify-between items-start">
                    <h2 id="activeMethodName" class="cyber-title text-base font-bold text-blue-400">Tên Phương Pháp</h2>
                    <span id="activeMethodBadge" class="text-[10px] px-2 py-0.5 rounded border border-slate-700 bg-slate-800 text-slate-400">Loại</span>
                </div>
                <div id="subSelectContainer" class="mt-2 hidden">
                    <label id="subSelectLabel" class="text-[10px] text-slate-400 block mb-1 uppercase tracking-wider">Chọn khía cạnh phân tích:</label>
                    <select id="subSelect" onchange="loadSubConceptDetails()" class="w-full text-xs bg-slate-950 border border-slate-700 rounded px-2 py-1 text-slate-300 focus:outline-none focus:border-purple-500"></select>
                </div>
            </div>

            <div class="flex-none bg-slate-950/60 border border-slate-800 rounded p-2.5 mb-3 text-xs text-slate-300 max-h-[35%] overflow-y-auto">
                <p id="methodCore" class="font-medium text-slate-200 mb-1"></p>
                <div id="methodSuggestions" class="space-y-1 text-slate-400 pl-2 border-l border-slate-700"></div>
            </div>

            <div class="flex-1 flex flex-col gap-2.5 min-h-0">
                <div class="flex-1 flex flex-col">
                    <label class="text-[11px] font-semibold text-slate-400 uppercase tracking-widest mb-1">1. Nhận xét / Điều kiện thực tế:</label>
                    <textarea id="workspaceNote" oninput="saveCurrentWork()" placeholder="Ghi lại các dữ kiện, ràng buộc thực tế, hoặc nhận định liên quan đến khía cạnh này..." 
                              class="w-full flex-1 bg-slate-950 border border-slate-800 rounded p-2 text-xs text-slate-200 placeholder-slate-600 focus:outline-none focus:border-emerald-500 resize-none"></textarea>
                </div>
                <div class="flex-1 flex flex-col">
                    <label class="text-[11px] font-semibold text-slate-400 uppercase tracking-widest mb-1">2. Giải pháp đề xuất:</label>
                    <textarea id="workspaceSolution" oninput="saveCurrentWork()" placeholder="Đề xuất các hành động thực tế, phương án xử lý dựa trên gợi mở ở trên..." 
                              class="w-full flex-1 bg-slate-950 border border-slate-800 rounded p-2 text-xs text-emerald-400 placeholder-slate-600 focus:outline-none focus:border-emerald-500 resize-none"></textarea>
                </div>
            </div>
        </section>

        <section class="col-span-4 flex flex-col bg-slate-900/40 border border-slate-800 rounded p-3 min-h-0">
            <div class="flex justify-between items-center mb-2 flex-none">
                <h2 class="text-xs font-bold uppercase tracking-wider text-slate-400">Bản Báo Cáo Chiến Lược</h2>
                <button onclick="exportToMarkdown()" class="text-[10px] bg-emerald-600/20 hover:bg-emerald-600 border border-emerald-500/30 text-emerald-300 hover:text-white px-2 py-0.5 rounded transition-all">
                    Sao chép MD
                </button>
            </div>

            <div id="summaryContainer" class="flex-1 overflow-y-auto border border-slate-800/60 bg-slate-950/40 rounded p-2 space-y-3 text-xs">
                <div class="text-slate-600 text-center py-8">Vui lòng điền nội dung phân tích để kích hoạt báo cáo tổng hợp...</div>
            </div>

            <div class="flex-none border-t border-slate-800 pt-2 mt-2">
                <div class="flex justify-between text-[10px] text-slate-400 mb-1">
                    <span>Mức độ hoàn thành hệ thống</span>
                    <span id="progressText">0%</span>
                </div>
                <div class="w-full bg-slate-800 h-1.5 rounded overflow-hidden">
                    <div id="progressBar" class="bg-gradient-to-r from-blue-500 to-emerald-500 h-full w-0 transition-all duration-300"></div>
                </div>
            </div>
        </section>

    </main>

    <div id="addModal" class="fixed inset-0 bg-black/70 backdrop-blur-xs flex items-center justify-center hidden z-50">
        <div class="bg-slate-900 border border-slate-700 w-96 rounded p-4 shadow-xl">
            <h3 class="cyber-title text-sm font-bold text-slate-200 mb-3 uppercase tracking-wider border-b border-slate-800 pb-1.5">Thêm phương pháp tư duy</h3>
            <div class="space-y-3 text-xs">
                <div>
                    <label class="block text-slate-400 mb-1">Tên phương pháp:</label>
                    <input type="text" id="newMethodName" placeholder="Ví dụ: 6 Chiếc Nón Tư Duy, 5S..." class="w-full bg-slate-950 border border-slate-700 rounded px-2 py-1.5 text-slate-200 focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-slate-400 mb-1">Ý nghĩa cốt lõi:</label>
                    <textarea id="newMethodCore" placeholder="Mô tả ngắn gọn tư duy cốt lõi..." class="w-full bg-slate-950 border border-slate-700 rounded p-2 h-16 text-slate-200 focus:outline-none focus:border-blue-500 resize-none"></textarea>
                </div>
                <div class="flex justify-end gap-2 pt-2">
                    <button onclick="closeAddMethodModal()" class="px-3 py-1 bg-slate-800 hover:bg-slate-700 rounded text-slate-400">Hủy</button>
                    <button onclick="addNewMethod()" class="px-3 py-1 bg-blue-600 hover:bg-blue-500 rounded text-white">Xác nhận</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCAMPER_DATA = [
            { id: 'S', name: 'S - Thay thế (Substitute)', core: 'Thay thế nguyên liệu, nhân sự, hay bước nào trong quy trình bằng một giải pháp tốt hơn?', prompts: ['Thay thế ai, hay cái gì?', 'Thay thế vật liệu, công cụ hoặc năng lượng?', 'Thay thế bước nào trong quy trình?', 'Thay đổi địa điểm hoặc thời gian?'] },
            { id: 'C', name: 'C - Kết hợp (Combine)', core: 'Tích hợp tính năng, sản phẩm, hay nguồn lực lại với nhau để tạo ra giá trị vượt trội?', prompts: ['Kết hợp sản phẩm này với một sản phẩm khác?', 'Tích hợp những tính năng để tăng tính đa năng?', 'Kết hợp mục tiêu, nguồn lực hoặc tài năng của nhiều bên?', 'Gộp các bước trong quy trình lại làm một?'] },
            { id: 'A', name: 'A - Thích nghi (Adapt)', core: 'Điều chỉnh điều gì để phù hợp với ngữ cảnh hoặc mục đích mới từ ngành khác?', prompts: ['Ý tưởng này có thể áp dụng vào một bối cảnh mới?', 'Sản phẩm hoặc quy trình nào tương tự trong quá khứ hay ngành khác?', 'Điều chỉnh yếu tố nào để phù hợp hơn với đối tượng mục tiêu mới?', 'Thay đổi cách tiếp cận để thích nghi với xu hướng hiện tại?'] },
            { id: 'M', name: 'M - Bổ sung / Phóng đại (Modify)', core: 'Thay đổi hình dáng, kích thước, hoặc nhấn mạnh yếu tố cốt lõi nào để tăng giá trị?', prompts: ['Phóng đại, kéo dài hoặc tăng cường yếu tố để tạo khác biệt?', 'Thêm thắt tính năng, giá trị gia tăng?', 'Chỉnh sửa thiết kế, cấu trúc, hoặc hình thức bên ngoài?', 'Yếu tố nào có thể được làm nổi bật nhất để thu hút người dùng?'] },
            { id: 'P', name: 'P - Ứng dụng (Put to other uses)', core: 'Có thể tái sử dụng thứ này vào mục đích hoàn toàn mới cho đối tượng khác không?', prompts: ['Sản phẩm/dịch vụ này có thể dùng vào việc gì khác ngoài chức năng chính?', 'Đối tượng nào khác có thể hưởng lợi từ giải pháp này?', 'Rác thải hoặc phụ phẩm của quy trình này có thể tái chế hay ứng dụng vào đâu?', 'Nếu đưa vào một thị trường hoàn toàn khác, nó sẽ giải quyết bài toán gì?'] },
            { id: 'E', name: 'E - Loại bỏ (Eliminate)', core: 'Cắt bớt bước nào, tính năng nào để tối giản hóa tối đa hệ thống vận hành?', prompts: ['Lược bỏ tính năng, bộ phận hoặc bước nào mà không làm giảm chất lượng?', 'Làm quy trình trở nên đơn giản, nhanh chóng và dễ dàng hơn?', 'Cắt giảm chi phí, thời gian hoặc nhân lực ở khâu nào?', 'Điều gì xảy ra nếu chúng ta bỏ qua hoàn toàn quy tắc truyền thống này?'] },
            { id: 'R', name: 'R - Đảo ngược (Reverse)', core: 'Đảo trật tự quy trình hoặc lật ngược vấn đề ra sao để tìm góc nhìn đột phá?', prompts: ['Quy trình sẽ ra sao nếu thực hiện ngược từ cuối lên đầu?', 'Có thể thay đổi thứ tự, trình tự các bước thực hiện không?', 'Điều gì xảy ra nếu lật ngược hoàn toàn giả định hoặc mục tiêu ban đầu?', 'Có thể hoán đổi vị trí, vai trò của các nhân sự hoặc bộ phận liên quan không?'] }
        ];

        const DONG_LUC_DATA = [
            { id: 'TG', name: 'I. Trigger (Tác động)', core: 'Tạo kích thích, gợi nhắc hoặc thông báo để hành vi bắt đầu.', prompts: ['Gợi nhắc / Thông báo (Dán giấy, Chuông báo, Điện thoại)', 'Hướng dẫn (Bài viết, Sơ đồ trực quan)', 'Kích thích động lực (Cài đặt deadline áp lực, Quan sát hành vi, Cam kết công khai, Làm gương)'] },
            { id: 'AB', name: 'II. Ability (Khả năng)', core: 'Làm cho hành vi trở nên dễ thực hiện hơn bằng cách nâng cao năng lực hoặc giảm độ khó.', prompts: ['Chia nhỏ mục tiêu (Phiên Pomodoro 25 phút)', 'Công cụ hỗ trợ (Chuẩn bị sẵn tài nguyên đầy đủ)', 'Tăng năng lực (Checklist + Quy trình chuẩn 3-5 bước, Hướng dẫn trực quan, Thử nghiệm nhỏ)', 'Tương trợ nhóm (Phân công vai trò cụ thể, Tạo nhóm hỗ trợ xã hội)'] },
            { id: 'MO', name: 'III. Motivation (Động lực)', core: 'Gia tăng khát khao hoặc năng lượng nội tại thúc đẩy hành động.', prompts: ['Mục tiêu & Thi đua (Bảng xếp hạng, Thử thách kích thích nỗ lực)', 'Áp lực xã hội (So sánh xã hội, Thông báo số đông 90% đã xong, Chuẩn mực chung)', 'Tạo cảm xúc (Tò mò đặt câu hỏi thú vị, Kể chuyện thuyết phục, Hình dung tương lai tích cực)', 'Phân tích lợi hại (Giải thích ý nghĩa lâu dài, Tránh mất mát bằng cách trừ điểm)'] },
            { id: 'RE', name: 'IV. Reinforcement (Củng cố)', core: 'Thưởng phạt nhằm định hình và lặp lại hành vi tốt.', prompts: ['Phần thưởng (Tích điểm đổi quà, Thưởng bất ngờ, Thưởng nhóm)', 'Ghi nhận (Khen cụ thể chi tiết, Vinh danh công khai, Danh hiệu tự hào)', 'Hình phạt & Phản hồi (Quy định rõ ràng nhất quán, Hiển thị số liệu tiến độ, Nhận xét lẫn nhau)'] },
            { id: 'EN', name: 'V. Môi trường (Environment)', core: 'Thiết kế không gian vật lý hoặc số để hành vi diễn ra thuận lợi tự nhiên.', prompts: ['Thiết kế tối ưu (Sắp xếp đồ vật thuận tiện, Giảm bước thực hiện, Loại bỏ rào cản thừa)', 'Tâm lý mặc định (Cài đặt hành vi tốt làm mặc định, Rút gọn chỉ giữ lại 2-3 lựa chọn để dễ quyết định)'] },
            { id: 'SU', name: 'VI. Duy trì (Sustenance)', core: 'Giữ vững hành vi tạo thành thói quen lâu dài không đứt gãy.', prompts: ['Suy nghĩ tích cực (Cho phép tự quyết, Thay đổi góc nhìn tích cực, Tạo cảm giác tiến bộ)', 'Thói quen & Trò chơi hóa (Chọn giờ cố định lặp lại, Thói quen nối tiếp, Nghi thức hóa, Gamification)'] }
        ];

        const KESACH_DATA = [
            { id: 'K1', name: 'Kế 1-6: Nhóm Mong Muốn / Thu Phục', core: 'Điều động đối phương thông qua lợi dụ, bẫy ngầm hoặc chinh phục nhân tâm.', prompts: ['Phao chuyên dẫn ngọc (Thả mồi nhỏ câu món hời lớn)', 'Mỹ nhân kế (Tác động cảm xúc/mối quan hệ gây nhiễu trí tuệ)', 'Không thành kế (Thế yếu tuyệt đối, cố tình bày hở để địch đa nghi rút lui)', 'Quan môn tróc tặc (Đóng cửa bắt giặc - Cắt đường thoát rồi mới xử lý)', 'Thượng ốc trừu thê (Rút thang - Đưa vào thế sâu không thể quay đầu)', 'Dục cầm cố túng (Muốn bắt nên thả - Nới lỏng kiểm soát để lộ mạng lưới ngầm)'] },
            { id: 'K2', name: 'Kế 7-8: Nhóm Tính Cách', core: 'Tấn công trực tiếp vào điểm yếu tâm lý hoặc thể xác đối thủ.', prompts: ['Khổ nhục kế (Chủ động chịu tổn thất ngắn hạn để thâm nhập, xóa nghi ngờ)', 'Khích tướng kế (Đánh vào lòng tự trọng, sĩ diện khiến đối phương mất tự chủ)'] },
            { id: 'K3', name: 'Kế 9-13: Đánh Vào Điểm Yếu Hệ Thống', core: 'Tác động trực tiếp vào bộ máy chỉ huy, nguồn hậu cần hoặc cấu trúc cốt lõi.', prompts: ['Mượn đao giết người (Lợi dụng mâu thuẫn bên thứ ba để xử lý đối thủ)', 'Viễn giao cận công (Kết giao xa đánh gần - Phân rã liên minh)', 'Cầm tặc cầm vương (Bắt giặc bắt vua - Đột kích thẳng mắt xích cốt lõi đứng đầu)', 'Phủ đề trừu tân (Rút củi đáy nồi - Triệt hạ dòng tiền, nguồn tài chính, hậu cần)', 'Thay lương hoán trụ (Thay rường đổi cột - Âm thầm đổi ruột bên trong giữ vỏ bên ngoài)'] },
            { id: 'K4', name: 'Kế 14-18: Điều Động Nguồn Lực', core: 'Sử dụng thông tin giả và nghi binh khiến đối phương bố trí sai vị trí quân bài.', prompts: ['Vô trung sinh hữu (Không làm thành có - Dàn dựng thông tin giả biến thật)', 'Vây Ngụy cứu Triệu (Tránh chỗ mạnh, đánh thẳng vào đầu não buộc địch rút về cứu viện)', 'Điều hổ ly sơn (Dụ cọp rời núi - Kéo đối phương ra khỏi vùng an toàn kiên cố)', 'Thanh đông kích tây (Tiếng động phía đông đánh phía tây - Điều động phân tán địch)', 'Ám độ Trần Thương (Công khai làm thủ tục quy trình cũ, âm thầm đi đường bí mật)'] },
            { id: 'K5', name: 'Kế 19-21: Che Giấu Bản Thân', core: 'Giấu mình tinh vi để tích lũy sức mạnh hoặc tiếp cận mục tiêu hợp pháp.', prompts: ['Giả đồ phạt Quắc (Mượn đường diệt Quắc - Dùng danh nghĩa bên trung gian hợp pháp)', 'Tiếu lý tàng đao (Cười nụ giấu dao - Ngoài mềm mỏng ngoại giao, trong chuẩn bị quyết liệt)', 'Giả si bất điên (Giả heo ăn hổ - Giả ngu ngơ tránh bị thanh trừng để tích lũy lực lượng)'] },
            { id: 'K6', name: 'Kế 22-25: Nhóm Phòng Thủ Rút Lui', core: 'Bảo toàn đại cục khi đối mặt với khủng hoảng hoặc sức mạnh áp đảo của địch.', prompts: ['Dĩ dật đãi lao (Lấy khỏe nhẹ địch mệt mỏi - Chiếm lợi thế sân nhà, chờ địch hành quân xa tiêu hao)', 'Tẩu vi thượng sách (Chạy là kế hay nhất - Chủ động rút lui bảo toàn hạt giống phục thù)', 'Lý đại đào cương (Cây mận chết thay đào - Hy sinh bộ phận nhỏ/mảng biên để cứu đại cục)', 'Kim thiền thoát xác (Ve sầu lột xác - Giữ nguyên vỏ bọc báo cáo bề ngoài để âm thầm chuyển đổi ruột)'] },
            { id: 'K7', name: 'Kế 26-32: Nhóm Thu Lợi & Tranh Chấp', core: 'Tận dụng khủng hoảng, sơ hở nhỏ hoặc mâu thuẫn đa phương để giành ưu thế.', prompts: ['Sấn hỏa đả kiếp (Theo lửa hoành hành - Trục lợi khi đối phương vướng scandal, chia rẽ nội bộ)', 'Thuận thủ khiên dương (Thuận tay dắt dê - Nhân cơ hội sơ hở nhỏ của hệ thống để thu vén)', 'Phản khách vi chủ (Đổi khách thành chủ - Từ vai trò phụ/cổ đông nhỏ vươn lên nắm quyền lõi)', 'Tá thi hoàn hồn (Mượn xác hoàn hồn - Hồi sinh thương hiệu/trào lưu cũ lỗi thời còn giá trị hoài niệm)', 'Hỗn thủy mạc ngư (Đục nước béo cò - Tung tin nhiễu khuấy động hỗn loạn đa phương)', 'Cách ngạn quan hỏa (Đứng nhìn lửa cháy - Trung lập chờ các đối thủ lớn triệt hạ kiệt quệ nhau)'] }
        ];
    </script>

    <script>
        // Khởi tạo state dữ liệu ứng dụng
        let coreMethods = [
            { code: '5WHY', type: 'STATIC', name: 'Chiến lược 5-WHY', core: 'Tìm nguyên nhân gốc rễ bằng cách đặt câu hỏi "Tại sao" liên tiếp 5 lần.', prompts: ['Hỏi liên tiếp để bóc tách các lớp bề mặt của vấn đề.', 'Mục tiêu: Tìm ra điểm nghẽn hệ thống thay vì lỗi cá nhân.'] },
            { code: 'SWOT', type: 'STATIC', name: 'Ma Trận SWOT', core: 'Phân tích toàn diện bối cảnh nội bộ và các tác động khách quan bên ngoài.', prompts: ['Strengths: Điểm mạnh cốt lõi có sẵn là gì?', 'Weaknesses: Điểm yếu, lỗ hổng hiện tại cần bù đắp?', 'Opportunities: Thời cơ, xu hướng bên ngoài có thể tận dụng?', 'Threats: Thách thức, rủi ro ngoại cảnh nào đang rình rập?'] },
            { code: 'SCAMPER', type: 'DYNAMIC_SELECT', name: 'SCAMPER Lab', data: SCAMPER_DATA },
            { code: 'DONG_LUC', type: 'DYNAMIC_SELECT', name: 'Đấu Trường Động Lực', data: DONG_LUC_DATA },
            { code: '36KE', type: 'DYNAMIC_SELECT', name: '36 Kế Sách Quân Sự', data: KESACH_DATA }
        ];

        // Bộ lưu trữ câu trả lời người dùng
        // Cấu trúc key: "METHODCODE" hoặc "METHODCODE_SUBID"
        let userAnswers = {};
        let activeKey = null;

        // Render danh sách phương pháp cột trái
        function renderMethodList() {
            const listContainer = document.getElementById('methodList');
            listContainer.innerHTML = '';

            coreMethods.forEach((method, index) => {
                const isSelected = activeKey && activeKey.startsWith(method.code);
                
                // Đếm số lượng tiểu mục đã điền của phương pháp này để tính hoàn thành
                let totalSub = 1;
                let doneSub = 0;

                if (method.type === 'STATIC') {
                    if (userAnswers[method.code] && (userAnswers[method.code].note || userAnswers[method.code].sol)) doneSub = 1;
                } else {
                    totalSub = method.data.length;
                    method.data.forEach(sub => {
                        const sKey = `${method.code}_${sub.id}`;
                        if (userAnswers[sKey] && (userAnswers[sKey].note || userAnswers[sKey].sol)) doneSub++;
                    });
                }

                const pct = Math.round((doneSub / totalSub) * 100);

                const item = document.createElement('div');
                item.className = `group flex flex-col p-2 rounded cursor-pointer transition-all border ${
                    isSelected 
                    ? 'bg-blue-950/60 border-blue-500/60 shadow-[0_0_8px_rgba(59,130,246,0.2)]' 
                    : 'bg-slate-900/60 border-slate-800/80 hover:border-slate-700'
                }`;
                item.setAttribute('onclick', `selectMethod('${method.code}')`);

                item.innerHTML = `
                    <div class="flex justify-between items-center w-full">
                        <span class="text-xs font-semibold ${isSelected ? 'text-blue-400' : 'text-slate-200'} group-hover:text-blue-300 transition-colors">
                            ${method.name}
                        </span>
                        <div class="flex items-center gap-1.5 flex-none" onclick="event.stopPropagation();">
                            <span class="text-[9px] font-mono text-slate-500">${doneSub}/${totalSub}</span>
                            <button onclick="removeMethod(${index})" class="text-slate-600 hover:text-rose-400 text-[11px] font-bold px-1 transition-colors" title="Xóa phương pháp này">×</button>
                        </div>
                    </div>
                    <div class="w-full bg-slate-950 h-0.5 mt-1.5 rounded-full overflow-hidden">
                        <div class="bg-gradient-to-r from-blue-500 to-purple-500 h-full transition-all" style="width: ${pct}%"></div>
                    </div>
                `;
                listContainer.appendChild(item);
            });

            updateGlobalProgress();
        }

        // Chọn một phương pháp từ danh sách
        function selectMethod(code) {
            const method = coreMethods.find(m => m.code === code);
            if (!method) return;

            document.getElementById('workspaceSection').classList.remove('hidden');
            document.getElementById('activeMethodName').innerText = method.name;

            const subContainer = document.getElementById('subSelectContainer');
            const subSelect = document.getElementById('subSelect');

            if (method.type === 'STATIC') {
                subContainer.classList.add('hidden');
                document.getElementById('activeMethodBadge').innerText = "Cấu trúc Tĩnh";
                activeKey = method.code;
                
                // Load nội dung lý thuyết static
                document.getElementById('methodCore').innerText = method.core;
                const sugBox = document.getElementById('methodSuggestions');
                sugBox.innerHTML = '';
                method.prompts.forEach(p => {
                    sugBox.innerHTML += `<div class="flex items-start gap-1"><span>•</span><span>${p}</span></div>`;
                });

                loadWorkspaceInput();
            } else {
                subContainer.classList.remove('hidden');
                document.getElementById('activeMethodBadge').innerText = "Cấu trúc Đa mục";
                
                // Build dropdown options
                subSelect.innerHTML = '';
                method.data.forEach(sub => {
                    const opt = document.createElement('option');
                    opt.value = sub.id;
                    opt.innerText = sub.name;
                    subSelect.appendChild(opt);
                });

                // Chọn tiểu mục đầu tiên mặc định
                subSelect.selectedIndex = 0;
                loadSubConceptDetails();
            }

            // Đồng bộ giao diện highlight list
            renderMethodList();
        }

        // Tải thông tin chi tiết của tiểu mục (SCAMPER / Động lực / Kế sách)
        function loadSubConceptDetails() {
            const subSelect = document.getElementById('subSelect');
            const subId = subSelect.value;
            
            // Tìm phương pháp lớn đang active thông qua cấu trúc activeKey cũ hoặc tìm trong mảng
            const activeMethod = coreMethods.find(m => activeKey && activeKey.startsWith(m.code)) || coreMethods.find(m => m.code === document.getElementById('subSelect').parentNode.parentNode.parentNode.querySelector('h2').innerText || m.name === document.getElementById('activeMethodName').innerText);
            if (!activeMethod || !activeMethod.data) return;

            activeKey = `${activeMethod.code}_${subId}`;
            const targetData = activeMethod.data.find(d => d.id === subId);

            if (targetData) {
                document.getElementById('methodCore').innerText = targetData.core;
                const sugBox = document.getElementById('methodSuggestions');
                sugBox.innerHTML = '';
                targetData.prompts.forEach(p => {
                    sugBox.innerHTML += `<div class="flex items-start gap-1"><span>•</span><span>${p}</span></div>`;
                });
            }

            loadWorkspaceInput();
        }

        // Đổ dữ liệu đã lưu từ userAnswers ra textareas
        function loadWorkspaceInput() {
            if (!activeKey) return;
            const data = userAnswers[activeKey] || { note: '', sol: '' };
            document.getElementById('workspaceNote').value = data.note;
            document.getElementById('workspaceSolution').value = data.sol;
        }

        // Lưu real-time khi người dùng gõ chữ
        function saveCurrentWork() {
            if (!activeKey) return;
            const noteVal = document.getElementById('workspaceNote').value;
            const solVal = document.getElementById('workspaceSolution').value;

            if (noteVal.trim() === '' && solVal.trim() === '') {
                delete userAnswers[activeKey];
            } else {
                userAnswers[activeKey] = {
                    note: noteVal,
                    sol: solVal
                };
            }
            
            // Cập nhật ngầm mà không gây giật lag giao diện list hoặc re-focus
            updateGlobalProgress();
            renderSummaryReport();
        }

        // Xóa một phương pháp tư duy khỏi bộ khung (Tính năng thêm bớt động)
        function removeMethod(index) {
            const method = coreMethods[index];
            // Xóa dữ liệu liên quan trong bộ nhớ trả lời
            if (method.type === 'STATIC') {
                delete userAnswers[method.code];
            } else {
                method.data.forEach(sub => delete userAnswers[`${method.code}_${sub.id}`]);
            }

            coreMethods.splice(index, 1);
            
            // Nếu phương pháp đang xóa khớp với màn hình hiện tại thì ẩn workspace đi
            if (activeKey && activeKey.startsWith(method.code)) {
                activeKey = null;
                document.getElementById('workspaceSection').classList.add('hidden');
            }

            renderMethodList();
            renderSummaryReport();
        }

        // Điều khiển Modal Thêm phương pháp
        function openAddMethodModal() { document.getElementById('addModal').classList.remove('hidden'); }
        function closeAddMethodModal() { 
            document.getElementById('addModal').classList.add('hidden');
            document.getElementById('newMethodName').value = '';
            document.getElementById('newMethodCore').value = '';
        }

        // Thêm phương pháp tùy biến mới vào hệ thống
        function addNewMethod() {
            const name = document.getElementById('newMethodName').value.trim();
            const core = document.getElementById('newMethodCore').value.trim();

            if (!name) { alert('Vui lòng nhập tên phương pháp tư duy!'); return; }

            const generatedCode = 'CUSTOM_' + Date.now();
            coreMethods.push({
                code: generatedCode,
                type: 'STATIC',
                name: name,
                core: core || 'Phương pháp tự định nghĩa bởi chuyên gia.',
                prompts: ['Điền các khía cạnh phân tích thực tế phù hợp với đặc thù bài toán của bạn.']
            });

            closeAddMethodModal();
            renderMethodList();
            selectMethod(generatedCode);
        }

        // Tính toán & hiển thị chỉ số tiến độ hoàn thành toàn cục
        function updateGlobalProgress() {
            let totalWeights = 0;
            let currentWeights = 0;

            coreMethods.forEach(m => {
                if (m.type === 'STATIC') {
                    totalWeights++;
                    if (userAnswers[m.code] && (userAnswers[m.code].note || userAnswers[m.code].sol)) currentWeights++;
                } else {
                    totalWeights += m.data.length;
                    m.data.forEach(sub => {
                        if (userAnswers[`${m.code}_${sub.id}`] && (userAnswers[`${m.code}_${sub.id}`].note || userAnswers[`${m.code}_${sub.id}`].sol)) currentWeights++;
                    });
                }
            });

            const pct = totalWeights > 0 ? Math.round((currentWeights / totalWeights) * 100) : 0;
            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('progressText').innerText = pct + '%';
        }

        // Biên dịch cấu trúc cây tổng kết dữ liệu báo cáo sang cột phải
        function renderSummaryReport() {
            const summaryContainer = document.getElementById('summaryContainer');
            const keys = Object.keys(userAnswers);

            if (keys.length === 0) {
                summaryContainer.innerHTML = '<div class="text-slate-600 text-center py-8">Vui lòng điền nội dung phân tích để kích hoạt báo cáo tổng hợp...</div>';
                return;
            }

            summaryContainer.innerHTML = '';

            // Group data by method name for aesthetic grouping
            coreMethods.forEach(method => {
                let segmentHTML = '';

                if (method.type === 'STATIC') {
                    if (userAnswers[method.code]) {
                        segmentHTML += createReportBlock(method.name, userAnswers[method.code]);
                    }
                } else {
                    let subBlocks = '';
                    method.data.forEach(sub => {
                        const sKey = `${method.code}_${sub.id}`;
                        if (userAnswers[sKey]) {
                            subBlocks += createReportBlock(sub.name, userAnswers[sKey]);
                        }
                    });
                    if (subBlocks) {
                        segmentHTML += `<div class="border-l-2 border-purple-500/40 pl-2 space-y-2">
                            <h4 class="text-[10px] font-bold text-purple-400 uppercase tracking-tight">${method.name}</h4>
                            ${subBlocks}
                        </div>`;
                    }
                }

                if (segmentHTML) {
                    summaryContainer.innerHTML += segmentHTML;
                }
            });
        }

        function createReportBlock(title, data) {
            return `
                <div class="bg-slate-900/60 border border-slate-800 p-2 rounded">
                    <h5 class="font-medium text-amber-400 text-[11px] mb-1">${title}</h5>
                    ${data.note ? `<p class="text-slate-400 mb-1"><span class="text-[10px] uppercase text-slate-500 block">Nhận xét/Điều kiện:</span>${data.note}</p>` : ''}
                    ${data.sol ? `<p class="text-emerald-400"><span class="text-[10px] uppercase text-slate-500 block">Giải pháp:</span>${data.sol}</p>` : ''}
                </div>
            `;
        }

        // Xuất Markdown thông minh ra bộ nhớ tạm (Clipboard) để chia sẻ nhanh
        function exportToMarkdown() {
            const prob = document.getElementById('problemInput').value.trim() || 'Chưa định nghĩa bài toán cụ thể.';
            let md = `# BÁO CÁO CHIẾN LƯỢC GIẢI QUYẾT VẤN ĐỀ\n\n`;
            md += `## 🎯 VẤN ĐỀ CỐT LÕI:\n> ${prob}\n\n`;
            md += `--- \n\n`;

            let bodyContent = '';
            coreMethods.forEach(method => {
                if (method.type === 'STATIC' && userAnswers[method.code]) {
                    bodyContent += `### 💡 ${method.name}\n`;
                    if (userAnswers[method.code].note) bodyContent += `- **Nhận xét/Điều kiện:** ${userAnswers[method.code].note}\n`;
                    if (userAnswers[method.code].sol) bodyContent += `- **📌 Giải pháp chiến lược:** ${userAnswers[method.code].sol}\n`;
                    bodyContent += `\n`;
                } else if (method.type === 'DYNAMIC_SELECT') {
                    let textAccumulator = '';
                    method.data.forEach(sub => {
                        const sKey = `${method.code}_${sub.id}`;
                        if (userAnswers[sKey]) {
                            textAccumulator += `#### → ${sub.name}\n`;
                            if (userAnswers[sKey].note) textAccumulator += `  - **Nhận xét/Điều kiện:** ${userAnswers[sKey].note}\n`;
                            if (userAnswers[sKey].sol) textAccumulator += `  - **📌 Giải pháp chiến lược:** ${userAnswers[sKey].sol}\n`;
                        }
                    });
                    if (textAccumulator) {
                        bodyContent += `### 🛠️ ${method.name.toUpperCase()}\n${textAccumulator}\n`;
                    }
                }
            });

            if (!bodyContent) {
                alert('Chưa có dữ liệu phân tích nào được nhập để xuất báo cáo.');
                return;
            }

            md += bodyContent;
            
            navigator.clipboard.writeText(md).then(() => {
                alert('Đã sao chép Bản báo cáo Chiến lược định dạng Markdown thành công vào Bộ nhớ tạm!');
            }).catch(err => {
                alert('Có lỗi xảy ra khi sao chép tự động: ' + err);
            });
        }

        // Khởi động render hệ thống ban đầu
        window.onload = function() {
            renderMethodList();
        }
    </script>
</body>
